version: '3.8'

services:
  geobot:
    build: .
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - ./qdrant_local_storage:/app/qdrant_local_storage
      - ./logs:/app/logs
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - PRIMARY_MODEL=${PRIMARY_MODEL:-deepseek/deepseek-chat-v3-0324}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
